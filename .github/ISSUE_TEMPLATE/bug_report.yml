name: Bug report
description: Report incorrect, unsafe, or irreproducible behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide commands, configuration, and a public minimal fixture.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the operating system, Python version, and package revision.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I removed credentials, proprietary data, and private database contents.
          required: true
